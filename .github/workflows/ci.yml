name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build (dist/kosmos-core.mjs)
        run: npm run build

      - name: Tests
        run: npm test

      - name: CLI smoke test (validate + assess)
        run: |
          node bin/okf.mjs --help
          node bin/okf.mjs assess . --json >/dev/null
