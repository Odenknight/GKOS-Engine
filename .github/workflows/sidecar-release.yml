name: Sidecar release

# Builds the desktop-agent SEA single binary (`kosmos-agent`) on each matching
# CI OS — SEA cannot cross-compile — and attaches the binaries to the tag's
# GitHub Release. Binaries are UNSIGNED (build spec decision 1); the shell
# repo (GKOS-Engine-Lite) consumes them as its Tauri sidecar.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build bundles
        run: npm run build

      - name: Tests
        run: npm test

      - name: Build SEA binary
        run: node scripts/build-sea.mjs

      - name: Collect binary
        shell: bash
        run: |
          mkdir -p out
          cp dist/kosmos-agent-* out/

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmos-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: out/*

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
          body: |
            Unsigned pre-release sidecar binaries (`kosmos-agent`). See the
            GKOS Engine Desktop install guide for the open-anyway steps
            (macOS right-click → Open / `xattr`; Windows SmartScreen
            "More info → Run anyway").

  # The standalone 3D viewer built in Odenknight/Kosmos-Oden ships alongside the
  # sidecar so a release carries both halves of the desktop viewer story: the
  # loopback API (the binaries above) and the page that consumes it. The HTML is
  # OS-independent, so a single linux job fetches it and attaches it once — no
  # need to duplicate it across the SEA matrix (which would also race the
  # upload). It appends to the same release the matrix legs publish to.
  viewer-asset:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download standalone viewer HTML from Kosmos-Oden
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p viewer
          # Newest `viewer-v*` release, falling back to the tag known-good at
          # authoring time if the query returns nothing.
          TAG="$(gh release list --repo Odenknight/Kosmos-Oden --limit 30 \
                  --json tagName --jq '[.[].tagName | select(startswith("viewer-v"))] | first' \
                || true)"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            TAG="viewer-v0.6.9-rc1"
          fi
          echo "Using Kosmos-Oden viewer release: $TAG"
          echo "VIEWER_TAG=$TAG" >> "$GITHUB_ENV"
          gh release download "$TAG" --repo Odenknight/Kosmos-Oden \
            --pattern vault-kosmos.html --dir viewer --clobber
          test -s viewer/vault-kosmos.html

      - name: Attach viewer HTML to this release
        uses: softprops/action-gh-release@v2
        with:
          files: viewer/vault-kosmos.html
          fail_on_unmatched_files: true
          append_body: true
          body: |

            ---
            `vault-kosmos.html` — the standalone 3D viewer built in
            Odenknight/Kosmos-Oden at ${{ env.VIEWER_TAG }}; consumes this
            sidecar's loopback API
            (`?api=http://127.0.0.1:<port>&token=<bearer>`, `/health` + `/graph`).
